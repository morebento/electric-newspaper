  cur=A.slice();render(cur);
}

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function render(data){
  var sorted=data.slice().sort(function(a,b){
    var av=col==='date'?a.sort_date:a[col]||'';
    var bv=col==='date'?b.sort_date:b[col]||'';
    return av<bv?(asc?-1:1):av>bv?(asc?1:-1):0;
  });
  var tb=document.getElementById('tbody');
  var nr=document.getElementById('nores');
  document.getElementById('result-count').textContent=sorted.length+' article'+(sorted.length===1?'':'s');
  if(!sorted.length){tb.innerHTML='';nr.style.display='block';return;}
  nr.style.display='none';
  var h='';
  for(var i=0;i<sorted.length;i++){
    var a=sorted[i];
    h+='<TR>'+
      '<TD CLASS="col-date">'+(a.date||'&mdash;')+'</TD>'+
      '<TD CLASS="col-title"><A HREF="#" ONCLICK="openNetscape(\''+a.url+'\');return false;">'+esc(a.title)+'</A></TD>'+
      '<TD CLASS="col-section"><SPAN CLASS="badge">'+esc(a.section)+'</SPAN></TD>'+
      '<TD CLASS="col-author">'+esc(a.author)+'</TD>'+
      '</TR>';
  }
  tb.innerHTML=h;
}

render(cur);
document.getElementById('result-count').textContent=A.length+' articles';
</SCRIPT>
</BODY>
</HTML>
